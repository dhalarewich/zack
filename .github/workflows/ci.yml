name: CI

on:
  push:
    branches: [main, master, "claude/*"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: GDScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Run gdlint
        run: make lint

  format-check:
    name: GDScript Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Check formatting
        run: make format-check

  test:
    name: GUT Unit Tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6-stable"
      GUT_VERSION: "v9.3.0"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /tmp/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64

      - name: Set Godot path
        run: echo "GODOT_BIN=/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64" >> $GITHUB_ENV

      - name: Cache GUT addon
        id: cache-gut
        uses: actions/cache@v4
        with:
          path: game/addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT
        if: steps.cache-gut.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$GUT_VERSION" \
            https://github.com/bitwes/Gut.git /tmp/gut-clone
          mkdir -p game/addons
          cp -r /tmp/gut-clone/addons/gut game/addons/gut
          rm -rf /tmp/gut-clone

      - name: Import project (generate .godot cache)
        run: |
          cd game
          timeout 30 $GODOT_BIN --headless --import || true

      - name: Run GUT tests
        run: |
          cd game
          $GODOT_BIN --headless -s addons/gut/gut_cmdln.gd \
            -gdir=res://tests/ \
            -gprefix=test_ \
            -gsuffix=.gd \
            -gexit
